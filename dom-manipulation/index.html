<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Generator</title>
</head>
<body>
    <h1>Random Quote Generator</h1>

    <p id="quoteText">Click the button to see a quote.</p>
    <p id="quoteCategory"></p>

    <button id="newQuoteButton">Show New Quote</button>

    <h2>Add a New Quote</h2>
    <input type="text" id="newQuoteText" placeholder="Enter quote text">
    <input type="text" id="newQuoteCategory" placeholder="Enter category">
    <button id="addQuoteButton">Add Quote</button>

    <h2>Filter Quotes by Category</h2>
    <select id="categorySelect">
        <option value="Motivation">Motivation</option>
        <option value="Inspiration">Inspiration</option>
        <option value="Life">Life</option>
    </select>

    <script src="script.js"></script>
</body>
</html>
